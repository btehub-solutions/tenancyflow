databases:
  - name: tenancyflow-db
    databaseName: tenancyflow
    user: tenancyflow
    plan: free

services:
  - type: web
    name: tenancyflow-web
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn tenancyflow.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tenancyflow-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: "*"
