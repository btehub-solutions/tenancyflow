<div class="space-y-1.5">
    <label class="text-sm font-medium text-gray-700 dark:text-gray-300 block" for="{{ id }}">{{ label }}</label>
    <div class="relative">
        {% if icon %}
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i data-lucide="{{ icon }}" class="w-5 h-5 text-gray-400"></i>
        </div>
        {% endif %}
        <input type="{{ type|default:'text' }}" name="{{ name }}" id="{{ id }}" 
            class="w-full {% if icon %}pl-10{% else %}pl-3{% endif %} pr-3 py-2.5 bg-gray-50/50 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:bg-white dark:focus:bg-gray-900 focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 transition-all"
            placeholder="{{ placeholder|default:'' }}"
            {% if required %}required{% endif %}
            {% if value %}value="{{ value }}"{% endif %}>
    </div>
    {% if help_text %}
    <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">{{ help_text }}</p>
    {% endif %}
</div>
