<!-- Navbar Component -->
<header class="h-16 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 sticky top-0 z-40">
    <div class="flex items-center justify-between h-full px-4 sm:px-6 lg:px-8">
        
        <!-- Left: Mobile Menu & Global Search -->
        <div class="flex items-center flex-1">
            <button @click="sidebarOpen = true" class="lg:hidden mr-4 p-2 rounded-lg text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                <i data-lucide="menu" class="w-5 h-5"></i>
            </button>
            
            <div class="max-w-md w-full hidden sm:block relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i data-lucide="search" class="w-4 h-4 text-gray-400"></i>
                </div>
                <input type="text" 
                    placeholder="Search properties, tenants, or transactions..." 
                    class="w-full pl-10 pr-4 py-2 bg-gray-50 dark:bg-gray-800 border-none rounded-xl text-sm focus:ring-2 focus:ring-primary-500/50 dark:text-gray-200 placeholder-gray-400 dark:placeholder-gray-500 transition-all">
                <div class="absolute inset-y-0 right-0 pr-2 flex items-center pointer-events-none">
                    <span class="text-xs font-semibold text-gray-400 border dark:border-gray-600 rounded px-1.5 opacity-50">Ctrl K</span>
                </div>
            </div>
        </div>

        <!-- Right: Actions -->
        <div class="flex items-center space-x-2 sm:space-x-4">
            
            <!-- Dark Mode Toggle -->
            <button @click="darkMode = !darkMode" class="p-2 rounded-lg text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" title="Toggle theme">
                <i x-show="!darkMode" data-lucide="moon" class="w-5 h-5"></i>
                <i x-show="darkMode" data-lucide="sun" class="w-5 h-5 text-warning" x-cloak></i>
            </button>
            
            <!-- Notifications -->
            <button class="relative p-2 rounded-lg text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                <i data-lucide="bell" class="w-5 h-5"></i>
                <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-danger rounded-full border-2 border-white dark:border-gray-900"></span>
            </button>

            <!-- Add Property CTA -->
            <a href="{% url 'properties:create' %}" class="hidden sm:flex items-center px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white text-sm font-semibold rounded-xl shadow-sm shadow-primary-500/20 transition-all active:scale-95">
                <i data-lucide="plus" class="w-4 h-4 mr-2"></i>
                Add Property
            </a>

            <!-- Avatar Dropdown (Simple visual for now) -->
            <div class="relative ml-2">
                <button class="flex items-center outline-none">
                    <div class="h-8 w-8 rounded-full bg-gradient-to-br from-primary-400 to-primary-600 flex items-center justify-center text-white font-semibold text-sm shadow-sm border border-white dark:border-gray-800">
                        {{ request.user.username|make_list|first|upper }}
                    </div>
                </button>
            </div>
        </div>
    </div>
</header>
