<div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl p-5 sm:p-6 shadow-[0_2px_10px_-3px_rgba(6,81,237,0.05)] hover:shadow-lg transition-all duration-300 group relative overflow-hidden">
    <!-- Subtle Gradient Glow Top -->
    <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-{{ color|default:'primary' }}-400/50 to-{{ color|default:'primary' }}-600/50 opacity-0 group-hover:opacity-100 transition-opacity"></div>
    
    <div class="flex items-center justify-between">
        <div class="pr-2">
            <p class="text-xs sm:text-sm font-medium text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wide">{{ title }}</p>
            <h3 class="text-2xl sm:text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight">{{ value }}</h3>
        </div>
        <div class="w-12 h-12 rounded-2xl bg-{{ color|default:'primary' }}-50 dark:bg-{{ color|default:'primary' }}-900/30 flex items-center justify-center text-{{ color|default:'primary' }}-600 dark:text-{{ color|default:'primary' }}-400 group-hover:rotate-3 group-hover:scale-110 transition-all duration-300 shadow-inner">
            <i data-lucide="{{ icon }}" class="w-6 h-6 sm:w-7 sm:h-7 stroke-[1.5]"></i>
        </div>
    </div>
    
    {% if trend %}
    <div class="mt-4 flex items-center text-sm">
        <span class="flex items-center {% if trend_up %}text-success{% else %}text-danger{% endif %} font-medium bg-{% if trend_up %}success{% else %}danger{% endif %}-50 dark:bg-{% if trend_up %}success{% else %}danger{% endif %}-900/20 px-2 py-0.5 rounded-md">
            <i data-lucide="{% if trend_up %}trending-up{% else %}trending-down{% endif %}" class="w-4 h-4 mr-1"></i>
            {{ trend }}%
        </span>
        <span class="text-gray-400 dark:text-gray-500 ml-2 text-xs">vs last month</span>
    </div>
    {% endif %}
    
    {% if custom_html %}
    <div class="mt-4">
        {{ custom_html|safe }}
    </div>
    {% endif %}
</div>
